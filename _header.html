<header class="login_header">
    <div class="inner">
        <div class="logo"><a href="./index.html"><img src="./dist/images/logo_icon.png" alt=""></a></div>
        <div class="coin_box krw">
            <dl class="coin_item coin krw">
                <dt><svg class="w-5 h-5"><use xlink:href="./dist/images/icon-defs.svg#krw"></use></svg>KRW</dt>
                <dd><span>1,000,000,000</span> 원</dd>
            </dl>
            <dl class="coin_item coin usdt">
                <dt><svg class="w-5 h-5"><use xlink:href="./dist/images/icon-defs.svg#usdt"></use></svg>USDT</dt>
                <dd><span>1,000,000,000</span> 원</dd>
            </dl>
            <dl class="coin_item point">
                <dt><svg class="w-5 h-5"><use xlink:href="./dist/images/icon-defs.svg#point"></use></svg>포인트</dt>
                <dd>0</dd>
            </dl>
        </div>
        <div class="top_link">
            <a href="javascript:;" class="skew_btn mo_view" onclick="modalOpen('wallet-modal'); tabClickHandle('wallet-modal','0');"><svg class="w-5 h-[18px]"><use xlink:href="./dist/images/icon-defs.svg#deposit"></use></svg>입금</a>
            <a href="javascript:;" class="skew_btn mo_view" onclick="modalOpen('wallet-modal'); tabClickHandle('wallet-modal','1');"><svg class="w-5 h-[18px]"><use xlink:href="./dist/images/icon-defs.svg#withdrawal"></use></svg>출금</a>
            <a href="javascript:;" class="skew_btn type02" onclick="modalOpen('wallet-modal');"><svg class="w-5 h-[18px]"><use xlink:href="./dist/images/icon-defs.svg#wallet"></use></svg>지갑</a>
            <a href="./setting.html" class="icon_btn mo_view"><svg class="h-[22px]"><use xlink:href="./dist/images/icon-defs.svg#menu_user"></use></svg></a>
            <a href="./user_message.html" class="icon_btn"><svg class="h-6"><use xlink:href="./dist/images/icon-defs.svg#menu_envelope"></use></svg></a>
            <a href="javascript:;" class="icon_btn" onclick="modalOpen('inquiry-modal')"><svg class="h-6"><use xlink:href="./dist/images/icon-defs.svg#menu_support"></use></svg></a>
            <a href="javascript:;" class="icon_btn type02 mo_view" onclick="modalOpen('roulette_9-modal')"><svg class="h-[22px]"><use xlink:href="./dist/images/icon-defs.svg#menu_roulette"></use></svg></a>
        </div>
        <div class="mycoin">
            <img class="icon" src="./dist/images/icon/coin1.png" alt="">
            <div class="name_box flex items-center gap-2">
                <img class="h-7" src="./dist/images/icon/grade_emerald.png" alt="">
                <div class="name">한지성</div>
            </div>
            <div class="nocoin_layout">
                <div class="account grid grid-cols-2 mt-2">
                    <button class="flex flex-col items-center justify-center gap-0.5 w-full h-full coin off wait">
                        <div class="flex items-center justify-center gap-1">
                            <svg class="w-5 h-5 krw"><use xlink:href="./dist/images/icon-defs.svg#krw"></use></svg>
                            <!-- <span class="font-medium">KRW</span> -->
                        </div>
                        <!-- <i>지갑을 등록하세요</i> -->
                        <i>승인 대기 중</i>
                    </button>
                    <button class="flex flex-col items-center justify-center gap-0.5 w-full h-full coin off">
                        <div class="flex items-center justify-center gap-1">
                            <svg class="w-5 h-5 usdt"><use xlink:href="./dist/images/icon-defs.svg#usdt"></use></svg>
                            <!-- <span class="font-medium">USDT</span> -->
                        </div>
                        <i>지갑을 등록하세요</i>
                        <!-- <i>승인 대기 중</i> -->
                    </button>
                </div>
            </div>
            <div class="coin_layout">
                <div class="account grid grid-cols-2 mt-2">
                    <button class="flex flex-col items-center justify-center gap-0.5 w-full h-full coin active" onclick="coinChange(this,'krw')">
                        <div class="flex items-center justify-center gap-1">
                            <svg class="w-5 h-5 krw"><use xlink:href="./dist/images/icon-defs.svg#krw"></use></svg>
                            <!-- <span class="font-medium">KRW</span> -->
                        </div>
                    </button>
                    <button class="flex flex-col items-center justify-center gap-0.5 w-full h-full coin" onclick="coinChange(this,'usdt')">
                        <div class="flex items-center justify-center gap-1">
                            <svg class="w-5 h-5 usdt"><use xlink:href="./dist/images/icon-defs.svg#usdt"></use></svg>
                            <!-- <span class="font-medium">USDT</span> -->
                        </div>
                    </button>
                </div>
            </div>
        </div>
    </div>
</header>
